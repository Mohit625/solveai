services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    mem_limit: 256m
    cpus: 0.5

  server:
    build: ./server
    restart: unless-stopped
    env_file:
      - ./server/.env
    environment:
      REDIS_URL: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4000/health', r => process.exit(r.statusCode===200?0:1)).on('error', () => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    mem_limit: 512m
    cpus: 1

  client:
    build:
      context: ./client
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
        VITE_API_BASE_URL: /api/v1
    restart: unless-stopped
    depends_on:
      - server
    healthcheck:
      # 127.0.0.1, not "localhost" — Alpine's musl libc resolves "localhost"
      # to ::1 first, which nginx (bound to the IPv4 wildcard) refuses.
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:80"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 128m
    cpus: 0.5

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      client:
        condition: service_healthy
      server:
        condition: service_healthy
    healthcheck:
      # 127.0.0.1, not "localhost" — Alpine's musl libc resolves "localhost"
      # to ::1 first, which nginx (bound to the IPv4 wildcard) refuses.
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:80"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 128m
    cpus: 0.5

volumes:
  redis-data:
